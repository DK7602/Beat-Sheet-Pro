<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Beat Sheet Pro – Notes Photo Upgrade</title>
  <style>
    :root{
      --bg:#efefef;
      --card:#fff;
      --ink:#141414;
      --muted:#6f7280;
      --line:rgba(0,0,0,.12);
      --accent:#111;
      --shadow:0 12px 28px rgba(0,0,0,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#f6f6f6 0%,#ececec 100%);
      color:var(--ink);
      overflow:hidden;
    }
    button,input,select{font:inherit}
    .app{
      height:100%;
      display:grid;
      grid-template-rows:auto 1fr;
    }
    header{
      padding:14px;
      display:grid;
      gap:12px;
      background:rgba(255,255,255,.8);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
    }
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .title{
      font-size:clamp(22px,4vw,34px);
      font-weight:900;
      letter-spacing:.02em;
      margin-right:auto;
    }
    .subtle{color:var(--muted);font-size:13px}
    .pill,button,select,input[type="text"],input[type="email"],input[type="password"]{
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      min-height:44px;
      padding:0 14px;
      box-shadow:0 4px 12px rgba(0,0,0,.04);
    }
    button{
      cursor:pointer;
      font-weight:800;
    }
    button.primary{background:#111;color:#fff;border-color:#111}
    button.iconBtn{width:44px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:18px}
    select,input[type="text"]{min-width:160px}
    main{
      min-height:0;
      padding:14px;
      display:grid;
      grid-template-columns:1fr;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      min-height:0;
      display:grid;
      grid-template-rows:auto 1fr;
      overflow:hidden;
    }
    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      padding:12px;
      border-bottom:1px solid var(--line);
      background:#fafafa;
      align-items:center;
    }
    .toolbar .spacer{flex:1 1 auto}
    .notesWrap{
      min-height:0;
      overflow:auto;
      padding:16px;
      position:relative;
    }
    .notesEditor{
      min-height:100%;
      outline:none;
      font-size:18px;
      line-height:1.5;
      color:#151515;
      position:relative;
    }
    .notesEditor:empty:before{
      content:attr(data-placeholder);
      color:#999;
    }
    .notesEditor img{display:block;max-width:100%;user-select:none;-webkit-user-drag:none;pointer-events:none}
    .notesImageBlock{
      position:relative;
      display:inline-block;
      vertical-align:top;
      max-width:min(100%,560px);
      border-radius:16px;
      overflow:visible;
      margin:8px 0;
      touch-action:none;
      user-select:none;
      -webkit-user-select:none;
    }
    .notesImageBlock.is-selected .notesImage{
      outline:3px solid rgba(17,17,17,.18);
      outline-offset:4px;
    }
    .notesImage{
      width:100%;
      height:auto;
      display:block;
      border-radius:16px;
      box-shadow:0 8px 20px rgba(0,0,0,.12);
      background:#f3f3f3;
    }
    .notesImageDeleteBtn,.notesImageCropBtn{
      position:absolute;
      top:8px;
      width:28px;height:28px;
      border:none;
      border-radius:999px;
      background:rgba(17,17,17,.85);
      color:#fff;
      display:flex;align-items:center;justify-content:center;
      font-size:15px;font-weight:900;
      z-index:3;
      padding:0;
      box-shadow:0 4px 10px rgba(0,0,0,.2);
    }
    .notesImageDeleteBtn{right:8px}
    .notesImageCropBtn{right:42px}
    .notesImageResizeHandle{
      position:absolute;
      right:-6px;bottom:-6px;
      width:22px;height:22px;
      border-radius:50%;
      background:#111;
      border:3px solid #fff;
      z-index:4;
      box-shadow:0 4px 12px rgba(0,0,0,.22);
    }
    .statusBar{
      display:flex;gap:10px;align-items:center;justify-content:space-between;
      padding:10px 14px;border-top:1px solid var(--line);background:#fafafa;color:var(--muted);font-size:13px
    }
    .modal{
      position:fixed;inset:0;display:none;align-items:center;justify-content:center;
      background:rgba(0,0,0,.58);backdrop-filter:blur(3px);z-index:400;padding:14px
    }
    .modal.show{display:flex}
    .modalCard{
      width:min(520px,100%);
      background:#fff;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.15);
      box-shadow:0 22px 60px rgba(0,0,0,.25);
      padding:18px;
      display:grid;gap:12px
    }
    .authGrid{display:grid;gap:10px}
    .authGrid input{width:100%}
    .cropModal .modalCard{width:min(860px,100%);max-height:calc(100vh - 24px);padding:14px}
    .cropStageWrap{
      border:1px solid var(--line);
      border-radius:18px;
      padding:10px;
      background:#f7f7f7;
      overflow:auto;
    }
    .cropStage{
      position:relative;
      width:max-content;
      max-width:100%;
      margin:auto;
      touch-action:none;
    }
    .cropStage img{display:block;max-width:min(100%,720px);max-height:65vh;border-radius:16px}
    .cropShade{
      position:absolute;inset:0;pointer-events:none;
      background:rgba(0,0,0,.48);
      clip-path:polygon(0 0,100% 0,100% 100%,0 100%,0 0,var(--crop-x,10%) var(--crop-y,10%),var(--crop-x2,90%) var(--crop-y,10%),var(--crop-x2,90%) var(--crop-y2,90%),var(--crop-x,10%) var(--crop-y2,90%),var(--crop-x,10%) var(--crop-y,10%));
      border-radius:16px;
    }
    .cropSelection{
      position:absolute;
      border:2px solid #fff;
      box-shadow:0 0 0 9999px rgba(0,0,0,.45);
      border-radius:12px;
      cursor:move;
    }
    .cropHandle{
      position:absolute;
      width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid #111;
    }
    .cropHandle.br{right:-10px;bottom:-10px;cursor:nwse-resize}
    .cropHandle.tl{left:-10px;top:-10px;cursor:nwse-resize}
    .cropHandle.tr{right:-10px;top:-10px;cursor:nesw-resize}
    .cropHandle.bl{left:-10px;bottom:-10px;cursor:nesw-resize}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    @media (max-width: 720px){
      .title{width:100%;margin-right:0}
      .toolbar{gap:8px}
      .pill,button,select,input[type="text"],input[type="email"],input[type="password"]{min-height:42px}
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="row">
        <div class="title">Beat Sheet Pro</div>
        <button id="cloudBtn" class="pill">Cloud</button>
        <button id="syncBtn" class="pill">Sync now</button>
      </div>
      <div class="row">
        <select id="projectPicker"></select>
        <button id="newProjectBtn">New project</button>
        <button id="renameProjectBtn">Rename</button>
        <button id="deleteProjectBtn">Delete</button>
        <div class="subtle" id="cloudStatus">Local only</div>
      </div>
    </header>

    <main>
      <section class="card">
        <div class="toolbar" id="notesToolbar">
          <button id="notesAttachBtn" class="iconBtn" title="Add photo" aria-label="Add photo">📎</button>
          <input id="notesImageInput" type="file" accept="image/*" hidden />
          <select id="notesFontSize" title="Font size">
            <option value="16">16</option>
            <option value="18" selected>18</option>
            <option value="20">20</option>
            <option value="24">24</option>
            <option value="28">28</option>
          </select>
          <input id="notesTextColor" type="color" value="#151515" title="Text color" aria-label="Text color" style="width:52px;padding:4px" />
          <button id="boldBtn"><b>B</b></button>
          <button id="italicBtn"><i>I</i></button>
          <button id="underlineBtn"><u>U</u></button>
          <button id="saveBtn" class="primary">Save</button>
          <div class="spacer"></div>
          <div class="subtle">Long-press a photo to drag it anywhere.</div>
        </div>
        <div class="notesWrap">
          <div id="notesEditor" class="notesEditor" contenteditable="true" spellcheck="true" data-placeholder="Write notes here. Use the paperclip to add photos."></div>
        </div>
        <div class="statusBar">
          <div id="statusText">Ready</div>
          <div id="projectMeta" class="mono"></div>
        </div>
      </section>
    </main>
  </div>

  <div id="authModal" class="modal" aria-hidden="true">
    <div class="modalCard">
      <div class="row"><strong style="font-size:20px">Cloud sync</strong><button id="authCloseBtn" style="margin-left:auto">Close</button></div>
      <div class="subtle">Sign in to sync notes and photos across devices.</div>
      <div id="authMessage" class="subtle"></div>
      <div class="authGrid">
        <input id="authEmailInput" type="email" placeholder="Email" />
        <input id="authPasswordInput" type="password" placeholder="Password" />
      </div>
      <div class="row">
        <button id="authSignInBtn" class="primary">Sign in</button>
        <button id="authSignUpBtn">Sign up</button>
        <button id="authSignOutBtn">Sign out</button>
      </div>
    </div>
  </div>

  <div id="cropModal" class="modal cropModal" aria-hidden="true">
    <div class="modalCard">
      <div class="row">
        <strong style="font-size:20px">Crop photo</strong>
        <button id="cropCloseBtn" style="margin-left:auto">Close</button>
      </div>
      <div class="cropStageWrap">
        <div id="cropStage" class="cropStage">
          <img id="cropImage" alt="Crop preview" />
          <div id="cropSelection" class="cropSelection">
            <span class="cropHandle tl" data-handle="tl"></span>
            <span class="cropHandle tr" data-handle="tr"></span>
            <span class="cropHandle bl" data-handle="bl"></span>
            <span class="cropHandle br" data-handle="br"></span>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="subtle">Drag the box or its corners, then apply.</div>
        <button id="cropApplyBtn" class="primary" style="margin-left:auto">Apply crop</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app.js"></script>
</body>
</html>
